<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subject Experiments — RUET CSE</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="wide">

<div class="top-nav">
  <a href="/" class="back">← Home</a>
  <span style="color:var(--border)">·</span>
  <span class="page-title">🔬 Subject Experiments</span>
</div>

<div class="section-header">
  <span class="section-label">{{ subjects|length }} subject(s)</span>
  <button class="btn btn-primary" onclick="document.getElementById('addModal').classList.add('active')">+ Add Subject</button>
</div>

{% if subjects %}
{% for s in subjects %}
<div class="card">
  <div class="card-header">
    <div>
      <div class="card-subject">{{ s.subject }}</div>
      <div class="card-meta" style="margin-top:.3rem">
        <span class="type-badge type-{{ s.type }}">{{ s.type }}</span>
      </div>
      <div class="exp-count">{{ s.experiments|length }} experiment(s) stored</div>
    </div>
  </div>
  <div class="card-actions">
    <a href="/experiments/edit/{{ s._id }}" class="btn btn-edit btn-sm">✏️ Edit</a>
    <form method="POST" action="/experiments/delete/{{ s._id }}" style="display:inline" onsubmit="return confirm('Delete subject and all its experiments?')">
      <button type="submit" class="btn btn-danger btn-sm">🗑 Delete</button>
    </form>
  </div>
</div>
{% endfor %}
{% else %}
<div class="empty">No subjects yet ✨<br>Click "+ Add Subject" to create one.</div>
{% endif %}

<!-- Add Modal -->
<div id="addModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">Add Subject</div>
    <form method="POST" action="/experiments/add">
      <label>Subject Code (e.g. EEE 2152)</label>
      <input type="text" name="subject" required placeholder="CSE 2101">
      <label>Type</label>
      <select name="type">
        <option value="sessional">Sessional</option>
        <option value="theory">Theory</option>
      </select>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save</button>
        <button type="button" class="btn" style="background:var(--border);color:var(--text)" onclick="document.getElementById('addModal').classList.remove('active')">Cancel</button>
      </div>
    </form>
  </div>
</div>
  </div>
</body>
</html>
